name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install golangci-lint
        uses: taiki-e/install-action@v2
        with:
          tool: golangci-lint

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli

      - name: Build via just
        run: just build

      - name: Run coverage via just
        run: just cover

      - name: Run lint via just
        run: just lint

      - name: Run spellcheck via just
        run: just spellcheck

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          disable_search: true
          handle_no_reports_found: true
          fail_ci_if_error: false
