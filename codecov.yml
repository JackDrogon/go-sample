codecov:
  notify:
    after_n_builds: 1
    wait_for_ci: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_not_found: success
    patch:
      default:
        target: auto
        threshold: 1%
        if_not_found: success

ignore:
  - "**/*_test.go"
  - "**/testdata/**"
  - "**/*.md"
  - "**/vendor/**"

comment:
  layout: "condensed_header,diff,files"
  behavior: default
  require_changes: false

github_checks:
  annotations: true
